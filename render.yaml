# Render Blueprint for the HearO dev server.
#
# Renders runs the Docker image declared in /Dockerfile. The wrapper script
# (dev-server/start.mjs) spawns Metro and opens an ngrok tunnel using
# NGROK_AUTHTOKEN — Expo's built-in --tunnel path failed against multiple
# known-good EXPO_TOKEN values, so we manage ngrok ourselves.

services:
  - type: web
    name: hearo-dev
    runtime: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: NGROK_AUTHTOKEN
        sync: false  # set in the Render dashboard from your ngrok account
      - key: EXPO_TOKEN
        sync: false  # set in the Render dashboard, same value as in GitHub
