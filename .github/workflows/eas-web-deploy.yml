name: Deploy Web App

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: eas-web-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Trigger EAS web deployment
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Run EAS web deployment workflow
        run: eas workflow:run .eas/workflows/deploy-web.yml --non-interactive --wait
