name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Jest + coverage gate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Enforces the src/lib coverage threshold (85% lines / 80% branches)
      # configured in package.json. See docs/adr/ADR-001 and
      # docs/TEST_COVERAGE_PLAN.md. A failing gate fails the job.
      - name: Run tests with coverage
        run: npm run test:coverage -- --ci
