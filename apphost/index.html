<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HearO — open in Expo Go</title>
    <style>
      :root {
        --bg: #f2ebdd;
        --bg-elev: #e8decb;
        --text: #2e2823;
        --text-mute: #7a7060;
        --accent: #c17a45;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 24px;
      }
      main { max-width: 480px; width: 100%; text-align: center; }
      .eyebrow {
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--text-mute);
        margin-bottom: 12px;
      }
      h1 {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 32px;
        line-height: 1.2;
        margin-bottom: 28px;
        font-weight: 400;
      }
      .qr-frame {
        background: var(--bg-elev);
        border-radius: 24px;
        padding: 24px;
        margin: 0 auto 24px;
        width: 296px;
        height: 296px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }
      .qr-frame svg { width: 240px; height: 240px; }
      .status {
        font-size: 14px;
        color: var(--text-mute);
        line-height: 1.6;
        margin-bottom: 24px;
        min-height: 2.5em;
      }
      .status.warming {
        color: var(--accent);
      }
      ol {
        list-style: none;
        text-align: left;
        font-size: 14px;
        color: var(--text-mute);
        line-height: 1.7;
      }
      ol li {
        padding: 8px 0;
        border-top: 1px solid rgba(122, 112, 96, 0.18);
      }
      ol li:first-child { border-top: 0; }
      ol li .step {
        display: inline-block;
        font-weight: 600;
        color: var(--accent);
        margin-right: 6px;
      }
      a { color: var(--accent); }
      .spinner {
        width: 28px;
        height: 28px;
        border: 2px solid var(--text-mute);
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">HearO beta</p>
      <h1>Open the latest build<br />in Expo Go.</h1>

      <div class="qr-frame" id="qr-frame">
        <div class="spinner" aria-label="loading"></div>
      </div>

      <p class="status" id="status">Waking the dev server…</p>

      <ol>
        <li>
          <span class="step">1.</span>Install
          <a href="https://apps.apple.com/app/expo-go/id982107779" target="_blank" rel="noopener">Expo Go on iPhone</a>
          or
          <a href="https://play.google.com/store/apps/details?id=host.exp.exponent" target="_blank" rel="noopener">on Android</a>.
        </li>
        <li>
          <span class="step">2.</span>Open Expo Go → "Scan QR code". Point at the QR above.
        </li>
        <li>
          <span class="step">3.</span>HearO loads in a few seconds.
        </li>
      </ol>
    </main>

    <!-- qrcode-generator @ jsDelivr — small, well-known, no build step. The
         previous `qrcode@1.5.4/build/qrcode.min.js` path was 404 (npm
         package doesn't actually ship a /build dir), which left the page
         silently stuck on "warming…" because renderQr threw on undefined
         QRCode. -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script>
      // The Render dev server's public URL. Replace via VERCEL env at build
      // time if we ever script this; for now it's hardcoded after deploy.
      const DEV_SERVER = "https://hearo-dev.onrender.com";
      const REFRESH_MS = 5000;
      const MAX_WARM_WAIT_MS = 90_000;

      const qrFrame = document.getElementById("qr-frame");
      const status = document.getElementById("status");

      let lastUrl = null;
      let warmStartedAt = null;

      function renderQr(text) {
        // Render the QR into an inline SVG so it scales cleanly on any DPR.
        // qrcode-generator API: qrcode(typeNumber=0 auto, errCorrection 'M').
        try {
          const qr = qrcode(0, "M");
          qr.addData(text);
          qr.make();
          // createSvgTag({ scalable: true }) makes the inner SVG fluid so
          // the .qr-frame's fixed pixel size scales it without blur.
          qrFrame.innerHTML = qr.createSvgTag({ scalable: true });
        } catch (err) {
          status.textContent = "Failed to render QR — refresh the page.";
          console.error(err);
        }
      }

      async function poll() {
        try {
          const resp = await fetch(`${DEV_SERVER}/tunnel`, {
            cache: "no-store",
          });
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const data = await resp.json();

          if (data.ready && data.url) {
            if (data.url !== lastUrl) {
              renderQr(data.url);
              lastUrl = data.url;
            }
            status.classList.remove("warming");
            status.textContent =
              "Ready. Scan with Expo Go. The QR refreshes whenever the bundle changes.";
            warmStartedAt = null;
          } else {
            if (!warmStartedAt) warmStartedAt = Date.now();
            const elapsed = Date.now() - warmStartedAt;
            status.classList.add("warming");
            if (elapsed > MAX_WARM_WAIT_MS) {
              status.textContent =
                "Dev server is taking longer than usual to wake — refresh in a moment.";
            } else {
              status.textContent = `Waking the dev server… (free tier, ~30s) ${Math.round(
                elapsed / 1000,
              )}s`;
            }
          }
        } catch (err) {
          if (!warmStartedAt) warmStartedAt = Date.now();
          status.classList.add("warming");
          status.textContent = `Waking the dev server… (free tier, ~30s) ${Math.round(
            (Date.now() - warmStartedAt) / 1000,
          )}s`;
        }
      }

      poll();
      setInterval(poll, REFRESH_MS);
    </script>
  </body>
</html>
